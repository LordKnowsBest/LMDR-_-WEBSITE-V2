steps:
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud sql connect lmdr-postgres --user=lmdr_user --database=lmdr --quiet < /workspace/scripts/sql/phase2-custom-tables.sql
    secretEnv: ['PGPASSWORD']
availableSecrets:
  secretManager:
    - versionName: projects/ldmr-velocitymatch/secrets/lmdr-pg-password/versions/latest
      env: 'PGPASSWORD'
