steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-central1-docker.pkg.dev/ldmr-velocitymatch/lmdr-repo/lmdr-matching-engine:$COMMIT_SHA'
      - '-f'
      - 'services/matching-engine/Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/ldmr-velocitymatch/lmdr-repo/lmdr-matching-engine:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - lmdr-matching-engine
      - '--image=us-central1-docker.pkg.dev/ldmr-velocitymatch/lmdr-repo/lmdr-matching-engine:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--service-account=lmdr-services-sa@ldmr-velocitymatch.iam.gserviceaccount.com'
      - '--add-cloudsql-instances=ldmr-velocitymatch:us-central1:lmdr-postgres'
      - '--min-instances=0'
      - '--max-instances=20'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--concurrency=80'
      - '--set-env-vars=NODE_ENV=production,SERVICE_NAME=lmdr-matching-engine,PG_DATABASE=lmdr,PG_USER=lmdr_user,CLOUD_SQL_INSTANCE=ldmr-velocitymatch:us-central1:lmdr-postgres'
      - '--set-secrets=PG_PASSWORD=lmdr-pg-password:latest,API_KEY_PEPPER=lmdr-api-key-pepper:latest'

images:
  - 'us-central1-docker.pkg.dev/ldmr-velocitymatch/lmdr-repo/lmdr-matching-engine:$COMMIT_SHA'
