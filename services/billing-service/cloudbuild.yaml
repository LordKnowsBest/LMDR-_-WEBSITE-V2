steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-central1-docker.pkg.dev/ldmr-velocitymatch/lmdr-repo/lmdr-billing-service:$COMMIT_SHA'
      - '-f'
      - 'services/billing-service/Dockerfile'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/ldmr-velocitymatch/lmdr-repo/lmdr-billing-service:$COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - lmdr-billing-service
      - '--image=us-central1-docker.pkg.dev/ldmr-velocitymatch/lmdr-repo/lmdr-billing-service:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--service-account=lmdr-services-sa@ldmr-velocitymatch.iam.gserviceaccount.com'
      - '--add-cloudsql-instances=ldmr-velocitymatch:us-central1:lmdr-postgres'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--set-env-vars=NODE_ENV=production,SERVICE_NAME=lmdr-billing-service,PG_DATABASE=lmdr,PG_USER=lmdr_user,CLOUD_SQL_INSTANCE=ldmr-velocitymatch:us-central1:lmdr-postgres'
      - '--set-secrets=PG_PASSWORD=lmdr-pg-password:latest,STRIPE_SECRET_KEY=lmdr-stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=lmdr-stripe-webhook-secret:latest'
images:
  - 'us-central1-docker.pkg.dev/ldmr-velocitymatch/lmdr-repo/lmdr-billing-service:$COMMIT_SHA'
