steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-central1-docker.pkg.dev/ldmr-velocitymatch/lmdr-repo/lmdr-ai-service:$COMMIT_SHA'
      - '-f'
      - 'services/ai-service/Dockerfile'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/ldmr-velocitymatch/lmdr-repo/lmdr-ai-service:$COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - lmdr-ai-service
      - '--image=us-central1-docker.pkg.dev/ldmr-velocitymatch/lmdr-repo/lmdr-ai-service:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--service-account=lmdr-services-sa@ldmr-velocitymatch.iam.gserviceaccount.com'
      - '--add-cloudsql-instances=ldmr-velocitymatch:us-central1:lmdr-postgres'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--memory=1Gi'
      - '--cpu=2'
      - '--set-env-vars=NODE_ENV=production,SERVICE_NAME=lmdr-ai-service,PG_DATABASE=lmdr,PG_USER=lmdr_user,CLOUD_SQL_INSTANCE=ldmr-velocitymatch:us-central1:lmdr-postgres'
      - '--set-secrets=PG_PASSWORD=lmdr-pg-password:latest,OPENAI_API_KEY=lmdr-openai-api-key:latest,CLAUDE_API_KEY=lmdr-claude-api-key:latest,GROQ_API_KEY=lmdr-groq-api-key:latest,GEMINI_API_KEY=lmdr-gemini-api-key:latest,DEEPSEEK_API_KEY=lmdr-deepseek-api-key:latest'
images:
  - 'us-central1-docker.pkg.dev/ldmr-velocitymatch/lmdr-repo/lmdr-ai-service:$COMMIT_SHA'
