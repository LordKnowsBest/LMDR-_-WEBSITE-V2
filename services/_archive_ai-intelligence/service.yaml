apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: lmdr-ai-service
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/client-name: "gcloud"
    spec:
      containerConcurrency: 20
      timeoutSeconds: 300
      serviceAccountName: lmdr-ai-sa@ldmr-velocitymatch.iam.gserviceaccount.com
      containers:
        - name: app
          image: us-central1-docker.pkg.dev/ldmr-velocitymatch/cloud-run-source-deploy/lmdr-ai-service:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: RUNTIME_PROVIDER
              value: gemini
            - name: GCP_PROJECT_ID
              value: ldmr-velocitymatch
            - name: GCP_LOCATION
              value: us-central1
            - name: LMDR_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: lmdr-internal-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: lmdr-claude-api-key
            - name: VOYAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: voyage-api-key
            - name: PINECONE_API_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: pinecone-api-key
            - name: FMCSA_WEB_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: lmdr-fmcsa-web-key
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
