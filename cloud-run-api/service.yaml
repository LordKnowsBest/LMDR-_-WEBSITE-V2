apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: lmdr-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cloudsql-instances: ldmr-velocitymatch:us-central1:lmdr-postgres
        run.googleapis.com/container-dependencies: '{"app":["collector"]}'
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/client-name: "gcloud"
        deploy-timestamp: "2026-03-10T2245"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: lmdr-api-sa@ldmr-velocitymatch.iam.gserviceaccount.com
      containers:
        # ── Main app container ──
        - name: app
          image: us-central1-docker.pkg.dev/ldmr-velocitymatch/cloud-run-source-deploy/lmdr-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: PG_DATABASE
              value: lmdr
            - name: PG_USER
              value: lmdr_user
            - name: CLOUD_SQL_INSTANCE
              value: ldmr-velocitymatch:us-central1:lmdr-postgres
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://localhost:4317
            - name: LMDR_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: lmdr-internal-key
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: lmdr-pg-password
            - name: API_KEY_PEPPER
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: lmdr-api-key-pepper
          resources:
            limits:
              cpu: "1"
              memory: 512Mi

        # ── OTel Collector sidecar ──
        - name: collector
          image: us-central1-docker.pkg.dev/ldmr-velocitymatch/cloud-run-source-deploy/lmdr-otel-collector:latest
          startupProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: 250m
              memory: 128Mi
