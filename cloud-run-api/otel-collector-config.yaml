# =============================================================================
# OpenTelemetry Collector sidecar config for LMDR Cloud Run API
# Receives OTLP from the app on :4317/:4318, exports to Google Cloud
# =============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_max_size: 200
    send_batch_size: 200
    timeout: 5s

  memory_limiter:
    check_interval: 1s
    limit_percentage: 65
    spike_limit_percentage: 20

  resourcedetection:
    detectors: [env, gcp]
    timeout: 2s
    override: false

  resource:
    attributes:
      - key: service.instance.id
        from_attribute: faas.id
        action: upsert
      - key: service.name
        value: ${env:K_SERVICE}
        action: insert

exporters:
  # Metrics → Cloud Monitoring (Managed Prometheus)
  googlemanagedprometheus:

  # Traces → Cloud Trace
  googlecloud:

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch, memory_limiter, resourcedetection, resource]
      exporters: [googlemanagedprometheus]
    traces:
      receivers: [otlp]
      processors: [batch, memory_limiter, resourcedetection, resource]
      exporters: [googlecloud]
