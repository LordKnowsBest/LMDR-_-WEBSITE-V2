steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-central1-docker.pkg.dev/ldmr-velocitymatch/lmdr-repo/lmdr-frontend:$COMMIT_SHA'
      - '-f'
      - 'frontend/Dockerfile'
      - 'frontend'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/ldmr-velocitymatch/lmdr-repo/lmdr-frontend:$COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - lmdr-frontend
      - '--image=us-central1-docker.pkg.dev/ldmr-velocitymatch/lmdr-repo/lmdr-frontend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--service-account=lmdr-frontend-sa@ldmr-velocitymatch.iam.gserviceaccount.com'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=1Gi'
      - '--cpu=2'
      - '--allow-unauthenticated'
      - '--set-env-vars=NODE_ENV=production,DISABLE_AUTH=true,LMDR_DRIVER_SERVICE_URL=https://lmdr-driver-service-140035137711.us-central1.run.app,LMDR_CARRIER_SERVICE_URL=https://lmdr-carrier-service-140035137711.us-central1.run.app,LMDR_MATCHING_SERVICE_URL=https://lmdr-matching-engine-140035137711.us-central1.run.app,LMDR_COMPLIANCE_SERVICE_URL=https://lmdr-compliance-service-140035137711.us-central1.run.app,LMDR_BILLING_SERVICE_URL=https://lmdr-billing-service-140035137711.us-central1.run.app,LMDR_NOTIFICATION_SERVICE_URL=https://lmdr-notifications-service-140035137711.us-central1.run.app,LMDR_AI_SERVICE_URL=https://lmdr-ai-service-140035137711.us-central1.run.app,LMDR_ANALYTICS_SERVICE_URL=https://lmdr-analytics-service-140035137711.us-central1.run.app,NEXT_PUBLIC_CDN_URL=https://storage.googleapis.com/lmdr-static-assets,GCP_PROJECT_ID=ldmr-velocitymatch'
images:
  - 'us-central1-docker.pkg.dev/ldmr-velocitymatch/lmdr-repo/lmdr-frontend:$COMMIT_SHA'
